<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE KEY EXCHANGE</title>
    <style>
        :root {
            --primary-color: #60a5fa;
            --primary-hover: #3b82f6;
            --bg-color: #020617;
            --card-bg: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --input-bg: #020617;
            --accent-bg: #1e293b;
        }

        body {
            font-family: "Inter", -apple-system, "SF Pro SC", "HanHei SC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 2.5rem;
            border: 1px solid var(--border-color);
        }

        h2 {
            margin: 0 0 2rem 0;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .section {
            margin-bottom: 1.5rem;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            padding: 0;
        }

        .copy-btn:hover {
            text-decoration: underline;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        input, textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 0;
            padding: 12px;
            font-size: 0.9rem;
            font-family: "JetBrains Mono", monospace;
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
        }

        button.action-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 0;
            font-size: 0.85rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: opacity 0.2s;
        }

        button.action-btn:hover {
            background-color: var(--primary-hover);
        }

        textarea {
            resize: none;
            min-height: 50px;
            background-color: var(--accent-bg);
            border-color: transparent;
        }

        .result-box {
            background-color: #020617;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>安全密钥交换</h2>

    <div class="section">
        <label>第一步：设置私钥</label>
        <div class="input-group" style="margin-top: 8px;">
            <input type="password" id="privateKey" placeholder="输入私钥字符串">
            <button class="eye-btn" onclick="toggleEye('privateKey')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>
        <div class="input-group" style="margin-top: 8px;">
            <input type="password" id="confirmKey" placeholder="确认私钥字符串">
            <button class="eye-btn" onclick="toggleEye('confirmKey')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
        </div>
        <button class="action-btn" onclick="generatePublic()">生成公开密钥</button>
    </div>

    <div class="section">
        <div class="label-row">
            <label>第二步：您的公钥</label>
            <button class="copy-btn" onclick="copyText('publicKey')">复制</button>
        </div>
        <textarea id="publicKey" readonly placeholder="等待生成..."></textarea>
    </div>

    <div class="section">
        <label>第三步：对方公钥</label>
        <textarea id="peerKey" style="background-color: var(--input-bg); border-color: var(--border-color);" placeholder="粘贴对方发送的公钥"></textarea>
        <button class="action-btn" onclick="computeShared()">计算共享密钥</button>
    </div>

    <div class="section">
        <div class="label-row">
            <label>最终结果：共享密钥 (AES-256)</label>
            <button class="copy-btn" onclick="copyText('sharedKey')">复制</button>
        </div>
        <textarea id="sharedKey" class="result-box" readonly placeholder="等待计算结果..."></textarea>
    </div>
</div>

<script>
const p = BigInt("0xFFFFFFFFFFFFFFFFC90FDAA22168C234C4C6628B80DC1CD1");
const g = 5n;

function toggleEye(id) {
    const el = document.getElementById(id);
    el.type = el.type === "password" ? "text" : "password";
}

function copyText(id) {
    const el = document.getElementById(id);
    if (!el.value) return;
    el.select();
    document.execCommand("copy");
    alert("已复制到剪贴板");
}

async function hashToBigInt(str){
    const enc = new TextEncoder().encode(str);
    const hash = await crypto.subtle.digest("SHA-256", enc);
    const hex = [...new Uint8Array(hash)].map(x=>x.toString(16).padStart(2,"0")).join("");
    return BigInt("0x"+hex);
}

function modPow(base, exp, mod){
    let result = 1n;
    base %= mod;
    while(exp > 0){
        if(exp % 2n === 1n) result = (result * base) % mod;
        exp /= 2n;
        base = (base * base) % mod;
    }
    return result;
}

async function generatePublic(){
    const k1 = document.getElementById("privateKey").value;
    const k2 = document.getElementById("confirmKey").value;
    if(!k1) { alert("私钥不能为空"); return; }
    if(k1 !== k2) { alert("两次输入的私钥不一致"); return; }
    const priv = await hashToBigInt(k1);
    const pub = modPow(g, priv, p);
    document.getElementById("publicKey").value = pub.toString();
}

async function computeShared(){
    const k1 = document.getElementById("privateKey").value;
    const peerKeyVal = document.getElementById("peerKey").value.trim();
    if(!peerKeyVal) { alert("请输入对方公钥"); return; }
    if(!k1) { alert("请输入个人私钥"); return; }
    try {
        const peer = BigInt(peerKeyVal);
        const priv = await hashToBigInt(k1);
        const shared = modPow(peer, priv, p);
        const enc = new TextEncoder().encode(shared.toString());
        const hash = await crypto.subtle.digest("SHA-256", enc);
        const key = [...new Uint8Array(hash)].map(x=>x.toString(16).padStart(2, "0")).join("");
        document.getElementById("sharedKey").value = key;
    } catch (e) { alert("公钥格式错误，请检查输入"); }
}
</script>

</body>
</html>
